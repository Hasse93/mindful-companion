services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: mindful
      POSTGRES_PASSWORD: mindful
      POSTGRES_DB: mindful
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U mindful"]
      interval: 5s
      timeout: 3s
      retries: 5

  backend:
    build: ./backend
    env_file:
      - ./backend/.env
    environment:
      # Override host to reach the db service inside the compose network.
      DATABASE_URL: postgresql+psycopg://mindful:mindful@db:5432/mindful
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy

volumes:
  pgdata:
